name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview
      - run: dotnet restore Bao1702Suite.slnx
      - run: dotnet build Bao1702Suite.slnx --configuration Release --no-restore
      - run: dotnet test Bao1702Suite.slnx --configuration Release --no-build
